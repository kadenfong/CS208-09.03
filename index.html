<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>Starting Lineup</title>
  <meta name="description" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

  <!-- Page heading -->
  <h1>Starting Lineup</h1>

  <!-- Form used to collect lineup info -->
  <form id="lineupForm">

    <!-- Selection for lineup status -->
    <fieldset>
      <legend>Status:</legend>

      <p>
        <!-- Draft status option -->
        <input type="radio" id="draft" name="status" value="Draft">
        <label for="draft">Draft</label>

        <!-- Final status option that's prechecked -->
        <input type="radio" id="final" name="status" value="Final" checked>
        <label for="final">Final</label>
      </p>

    </fieldset>

    <!-- Selection for game date -->
    <p>
      <label for="gameDate">Date:</label>

      <select name="gameDate" id="gameDate">
        <option value="March 20">March 20</option>
        <option value="March 24">March 24</option>
        <option value="April 2">April 2</option>
        <option value="April 6">April 6</option>
        <option value="April 13">April 13</option>
      </select>
    </p>

    <!-- Selection for players -->
    <fieldset>
      <legend>Players:</legend>

      <p>
        <input type="checkbox" id="p1" name="players" class="players" value="Aarav Agarwal">
        <label for="p1">Aarav Agarwal</label>
      </p>

      <p>
        <input type="checkbox" id="p2" name="players" class="players" value="Ava Johnson">
        <label for="p2">Ava Johnson</label>
      </p>

      <p>
        <input type="checkbox" id="p3" name="players" class="players" value="Julio Ortiz">
        <label for="p3">Julio Ortiz</label>
      </p>

      <p>
        <input type="checkbox" id="p4" name="players" class="players" value="Liam Rubio">
        <label for="p4">Liam Rubio</label>
      </p>

      <p>
        <input type="checkbox" id="p5" name="players" class="players" value="Emma Witherspoon">
        <label for="p5">Emma Witherspoon</label>
      </p>
  
    </fieldset>

    <!-- Submit button for the JavaScript function-->
    <p>
      <input type="submit" value="Submit">
    </p>

  </form>

  <!-- Place where JavaScript will display the lineup stuff -->
  <pre id="result"></pre>

  <script src="script.js"></script>

</body>

</html>
